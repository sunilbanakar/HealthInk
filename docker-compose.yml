version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthlink-api
    ports:
      - "8000:8000"
    environment:
      # Required API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}

      # LLM Configuration (optional overrides)
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gemini-2.5-flash}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.2}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}

      # Embedding Configuration
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-models/gemini-embedding-001}

      # Pinecone Configuration
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT:-}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-healthlink}

      # RAG Configuration
      - RAG_TOP_K=${RAG_TOP_K:-5}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}

      # Database
      - DATABASE_URL=sqlite:///./data/healthlink.db
      - DB_ECHO=${DB_ECHO:-False}

      # API Config
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=${API_RELOAD:-False}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8501"]

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Security
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}

      # Feature Flags
      - ENABLE_METRICS=${ENABLE_METRICS:-True}

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - healthlink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit Frontend UI
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthlink-ui
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000/api/v1
    command: ["streamlit", "run", "ui/streamlit_app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    depends_on:
      api:
        condition: service_healthy
    networks:
      - healthlink-network
    restart: unless-stopped
    healthcheck:
      disable: true

networks:
  healthlink-network:
    driver: bridge

volumes:
  healthlink-data:
  healthlink-logs:
