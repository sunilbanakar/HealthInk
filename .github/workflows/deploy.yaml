name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: healthlink
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/healthlink

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run linting
        run: |
          pip install ruff black
          ruff check . || true
          black --check . || true

      - name: Run tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build-and-deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      - name: Create GCR repository if needed
        run: |
          gcloud artifacts repositories create healthlink \
            --repository-format=docker \
            --location=us-central1 \
            --quiet || true

      # ── Ensure the secret exists in Secret Manager ──────────────────────────
      # This creates the secret if it doesn't exist; if it already exists the
      # command returns a non-zero exit code which we suppress with "|| true".
      # The secret VALUE is then added as a new version from the GitHub secret.
      - name: Ensure GEMINI_API_KEY secret exists in Secret Manager
        run: |
          gcloud secrets create GEMINI_API_KEY --replication-policy="automatic" || true
          echo -n "${{ secrets.GEMINI_API_KEY }}" | \
            gcloud secrets versions add GEMINI_API_KEY --data-file=-

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image to GCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # ── Grant the Cloud Run runtime SA access to the secret ─────────────────
      # The default Compute service account is used by Cloud Run at runtime.
      - name: Grant Cloud Run SA access to secrets
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          RUNTIME_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          gcloud secrets add-iam-policy-binding GEMINI_API_KEY \
            --member="serviceAccount:${RUNTIME_SA}" \
            --role="roles/secretmanager.secretAccessor" || true

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --port 8080 \
            --cpu 2 \
            --timeout 300 \
            --max-instances 10 \
            --min-instances 0 \
            --set-env-vars "LOG_LEVEL=INFO" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"

      # ── Retrieve the service URL after deployment ────────────────────────────
      # Uses --format so we don't need run.services.get beyond what gcloud deploy
      # already requires. If this step still fails, grant roles/run.viewer to the
      # deployer SA in GCP IAM Console.
      - name: Get service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Service deployed to: $SERVICE_URL"
          echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV

      - name: Run health check
        run: |
          sleep 30
          curl -m 60 -f ${{ env.SERVICE_URL }}/api/v1/health || exit 1
          echo "Health check passed!"

  build-and-deploy-ui:
    name: Build and Deploy Frontend (Streamlit) to Cloud Run
    runs-on: ubuntu-latest
    needs: build-and-deploy   # wait for API URL to be available
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}\

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker

      # ── Resolve the API backend URL for the UI container ────────────────────
      - name: Get API service URL
        run: |
          API_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "API_URL=$API_URL" >> $GITHUB_ENV

      - name: Build Docker image for UI
        run: |
          docker build -t ${{ env.IMAGE_NAME }}-ui:${{ github.sha }} -f ui/Dockerfile .
          docker tag ${{ env.IMAGE_NAME }}-ui:${{ github.sha }} ${{ env.IMAGE_NAME }}-ui:latest

      - name: Push Docker image to GCR
        run: |
          docker push ${{ env.IMAGE_NAME }}-ui:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}-ui:latest

      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-ui \
            --image ${{ env.IMAGE_NAME }}-ui:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --port 8080 \
            --cpu 2 \
            --timeout 300 \
            --max-instances 10 \
            --min-instances 0 \
            --set-env-vars "LOG_LEVEL=INFO,API_BASE_URL=${{ env.API_URL }}/api/v1" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-deploy, build-and-deploy-ui]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.build-and-deploy.result == 'success'
        run: |
          echo "Deployment successful!"
          echo "HealthLink is now live on Google Cloud Run"

      - name: Deployment Failed
        if: needs.build-and-deploy.result == 'failure'
        run: |
          echo "Deployment failed!"
          echo "Please check the logs above for errors"
          exit 1
